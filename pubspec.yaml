name: pdf_read
description: "Policy Document"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Helpers
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  provider: ^6.0.5
  animated_bottom_navigation_bar: ^1.4.0

  # Storage & Network
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.3
  dio: ^5.3.2
  pretty_dio_logger: ^1.3.1

  # OTP & Input
  sms_autofill: ^2.4.0
  pinput: ^5.0.0

  # File & Media
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  path_provider: ^2.1.5

  # Payment
  razorpay_flutter: ^1.4.5

  # PDF Viewer (choose one or both)
  syncfusion_flutter_pdfviewer: ^29.1.33   # or latest
  flutter_pdfview: ^1.3.1

  # URL & Sharing
  url_launcher: ^6.1.10
  share_plus: ^12.0.1

  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^19.5.0
  firebase_core: ^3.9.0

  # App update (optional)
  upgrader: ^11.0.0
  image_cropper: ^10.0.0+1
  flutter_html: ^3.0.0
  dropdown_search: ^5.0.6   # or latest version



dependency_overrides:
  image_cropper_platform_interface: 7.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/